name: Update Caddy

on:
  schedule:
    - cron: '0 3 * * *' # Check daily at 3am
  workflow_dispatch:      # Allow manual runs

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new Caddy release
        id: caddy
        run: |
          # Fetch latest release tag
          RAW_TAG=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name)
          
          if [ "$RAW_TAG" = "null" ] || [ -z "$RAW_TAG" ]; then
            echo "Error: Failed to fetch latest Caddy version. Rate limit or API error."
            exit 1
          fi
          
          LATEST=$(echo "$RAW_TAG" | sed 's/^v//')
          CURRENT=$(cat .last_release_tag 2>/dev/null || echo "0.0.0")
          
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            echo "Updating from $CURRENT to $LATEST"
          else
            echo "No new version found (current: $CURRENT)"
          fi

      - name: Set up Docker Buildx
        if: steps.caddy.outputs.version
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.caddy.outputs.version
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for testing
        if: steps.caddy.outputs.version
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: caddy-test:${{ steps.caddy.outputs.version }}
          build-args: CADDY_VERSION=${{ steps.caddy.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        if: steps.caddy.outputs.version
        run: |
          # Create test config
          echo ':8080 {
              respond "Hello World!"
          }' > Caddyfile.test

          # Run container
          docker run -d -p 8080:8080 -v $(pwd)/Caddyfile.test:/etc/caddy/Caddyfile --name caddy-test caddy-test:${{ steps.caddy.outputs.version }}
          
          # Wait for startup
          sleep 5
          
          # Test endpoint
          response=$(curl -s http://localhost:8080)
          if [ "$response" != "Hello World!" ]; then
            echo "Test failed! Expected 'Hello World!', got '$response'"
            docker logs caddy-test
            exit 1
          fi
          
          echo "Test passed!"
          docker rm -f caddy-test
          rm Caddyfile.test

      - name: Build and push
        if: steps.caddy.outputs.version
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.caddy.outputs.version }}
          build-args: CADDY_VERSION=${{ steps.caddy.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update version record
        if: steps.caddy.outputs.version
        run: |
          echo "${{ steps.caddy.outputs.version }}" > .last_release_tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_release_tag
          git commit -m "chore: bump caddy to ${{ steps.caddy.outputs.version }} [skip ci]"
          git push